# LiveKit server configuration for Bomb Squad (dev defaults).
# API keys are injected via LIVEKIT_KEYS env var in docker-compose.yml
# so the real keys never live in this file.
port: 7880
rtc:
  tcp_port: 7881
  # LOCALHOST DEV: UDP mux disabled (0) to force ICE/TCP over tcp_port 7881.
  # Docker-Desktop/WSL2 drops/expires the single-port UDP mux NAT mapping, which
  # makes the media PeerConnection flap (connected→reconnecting loop) and no
  # audio sustains. TCP (7881) is forwarded reliably by WSL2. Production uses the
  # single UDP mux port (7882) — restore `udp_port: 7882` there; robust NAT/TURN
  # traversal is Story 10-3.
  udp_port: 0
  # Set use_external_ip: true on a public server so SDP offers contain the
  # public IP rather than the container-internal address.
  use_external_ip: false
  # LOCALHOST DEV ONLY: without this, LiveKit advertises its container-internal
  # IP (172.18.x.x) as the ICE media candidate, which a host browser can't reach
  # → "negotiation timed out". Forcing 127.0.0.1 makes media flow over the
  # published 7882/udp (and 7881/tcp) mux ports. On a real server this is wrong —
  # use a routable node_ip / use_external_ip instead (deployment / Story 10-3).
  node_ip: "127.0.0.1"
logging:
  json: false
  level: info
